name: Bug report
description: Something isn't working the way it should.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. The more detail you give, the faster it can be tracked down.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: What did you click/do, in order?
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: dropdown
    id: deployment
    attributes:
      label: Deployment mode
      options:
        - Home Assistant App (Supervisor)
        - Standalone Docker
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Matter Registry version
      description: Shown at the bottom of the Settings page.
      placeholder: "0.3.14"
    validations:
      required: true

  - type: input
    id: ha_version
    attributes:
      label: Home Assistant version
      description: Only if running as an HA App. Settings → About.
      placeholder: "2026.1.1"
    validations:
      required: false

  - type: input
    id: browser
    attributes:
      label: Browser
      description: Only relevant for a display/UI bug.
      placeholder: "Chrome 125 on macOS"
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant log output
      description: Container logs around the time of the issue, if any. Redact tokens, pairing PINs, or other secrets first.
      render: shell
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else worth knowing - device vendor/protocol involved, whether it's reproducible, etc.
    validations:
      required: false
