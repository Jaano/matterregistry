<div id="attachment-grid">
{% if attachments %}
<div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-3">
  {% for a in attachments %}
  <div class="border border-gray-200 rounded overflow-hidden text-xs">
    {% if a.kind.value == 'image' %}
    <a href="{{ url('/api/devices/' + a.device_id + '/attachments/' + a.id) }}" target="_blank">
      <img src="{{ url('/api/devices/' + a.device_id + '/attachments/' + a.id) }}"
           alt="{{ a.filename }}"
           class="w-full h-24 object-cover bg-gray-100">
    </a>
    {% else %}
    <a href="{{ url('/api/devices/' + a.device_id + '/attachments/' + a.id) }}" target="_blank"
       class="flex items-center justify-center h-24 bg-gray-50 text-gray-400 hover:bg-gray-100">
      <div class="text-center">
        <div class="text-2xl">📄</div>
        <div class="text-xs text-gray-500 mt-1">{{ a.kind.value }}</div>
      </div>
    </a>
    {% endif %}
    <div class="p-1.5">
      <p class="truncate text-gray-700" title="{{ a.filename }}">{{ a.filename }}</p>
      <p class="text-gray-400">{{ (a.size_bytes / 1024) | round(1) }} KB</p>
      <button
        hx-delete="{{ url('/devices/' + a.device_id + '/attachments/' + a.id) }}"
        hx-confirm="{{ t.attachments.delete_confirm | replace('{name}', a.filename) }}"
        hx-target="#attachment-grid"
        hx-swap="outerHTML"
        class="mt-1 text-red-400 hover:text-red-600">{{ t.attachments.delete_btn }}</button>
    </div>
  </div>
  {% endfor %}
</div>
{% else %}
<p class="text-sm text-gray-400 py-2">{{ t.attachments.empty }}</p>
{% endif %}
</div>
